# ============================================================================
# Source: pytest.ini
# Version: 1.0.0 — 2026-04-16
# Why: pytest configuration — enables asyncio mode and test discovery settings
# Env / Identity: pytest configuration file
# ============================================================================

[pytest]
# Enable async test support via pytest-asyncio (for async route and DB tests)
asyncio_mode = auto

# Test discovery paths
testpaths = tests

# Verbose output by default
addopts = -v --tb=short

# Log level during tests
log_cli = true
log_cli_level = WARNING

# Suppress noisy deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:telegram.*:
    ignore::DeprecationWarning:sqlalchemy.*:
