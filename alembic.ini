# ============================================================================
# Source: alembic.ini
# Version: 1.0.0 — 2026-04-16
# Why: Alembic configuration for database migrations
# Env / Identity: Alembic CLI — SQLAlchemy migrations
# ============================================================================

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path to prepend before running env.py
prepend_sys_path = .

# Version path separator — use 'os' for OS default, 'space' for space separator
version_path_separator = os

# Database URL — overridden by env.py which reads from app.config
# This default is used only when running alembic CLI outside of Docker
sqlalchemy.url = sqlite+aiosqlite:///./bot.db

[post_write_hooks]
# No post-write hooks configured

# ---------------------------------------------------------------------------
# Logging configuration — controls output from alembic CLI
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
